<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}product-jobs{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f9ff', 500:'#0ea5e9', 600:'#0284c7', 700:'#0369a1' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .badge { @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <a href="/" class="flex items-center gap-2 font-bold text-brand-600 text-lg tracking-tight">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          product-jobs
        </a>
        <div class="flex items-center gap-1 text-sm">
          <a href="/" class="px-3 py-1.5 rounded-md hover:bg-gray-100 {% if request.endpoint == 'dashboard' %}bg-gray-100 font-medium{% endif %}">Dashboard</a>
          <a href="/jobs" class="px-3 py-1.5 rounded-md hover:bg-gray-100 {% if request.endpoint == 'job_list' %}bg-gray-100 font-medium{% endif %}">Jobs</a>
          <a href="/search" class="px-3 py-1.5 rounded-md hover:bg-gray-100 {% if request.endpoint == 'search_page' %}bg-gray-100 font-medium{% endif %}">Search</a>
          <a href="/resume" class="px-3 py-1.5 rounded-md hover:bg-gray-100 {% if request.endpoint == 'resume_page' %}bg-gray-100 font-medium{% endif %}">Resume</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-4 space-y-2">
      {% for cat, msg in messages %}
      <div class="rounded-md px-4 py-3 text-sm flex items-center gap-2
        {% if cat == 'error' %}bg-red-50 text-red-700 border border-red-200
        {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
        {% if cat == 'error' %}
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
        {% else %}
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
        {% endif %}
        {{ msg }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
  {% endwith %}

  <!-- Page content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
